FIN_CREDITRATING		= "Sovereign rating:"

PG_13_2				= "One of the hardest jobs in government is keeping an eye on the budget. All countries in Democracy 4 start with government debt. There is no rule that you ever have to pay it off, and as long as you can service the interest, you may do okay. However, interest payable on the debt can change dramatically. If bond yields rise due to inflation, fiscal imbalance, or sovereign risk concerns, rating agencies such as S&P, Moody's, and Fitch may reassess your sovereign debt rating. You will hear about any changes in your quarterly reports."
PG_13_3				= "When your sovereign rating changes, there will be a noticeable shift in interest rates. This can escalate quickly, so keep a close watch. Rating agencies weigh factors including your debt-to-GDP ratio, budget deficit, inflation outlook, and political stability. A strong economy with high GDP allows you to carry more debt, while a weak economy with rising yields will see borrowing costs spiral."

[REPORT_SUMMARYCREDITRATING]
0 = "S&P, Moody's, and Fitch have assessed our sovereign debt at <RATING>. This is a serious warning from the markets, and is pushing up the rate of interest we pay on our debt. We must take decisive fiscal action."
1 = "Our sovereign rating stands at just <RATING>. Rating agencies are signalling concern. We need to restore market confidence through GDP growth, spending cuts, or revenue increases."
